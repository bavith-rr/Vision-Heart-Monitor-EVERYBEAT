<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EveryBeat - Heartbeat Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap">
</head>
<body>
    <!-- Header Section -->
    <header>
        <div class="logo">
            <img src="https://i.ibb.co/cLy0cy8/logo.jpg" alt="EveryBeat Logo">
        </div>
        <nav>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero-section">
        <div class="hero-content">
            <h1>Welcome to <span class="highlight">EveryBeat</span></h1>
            <p>Monitor your heartbeat seamlessly</p>
            <button id="heartbeat-btn">Check Your Heartbeat</button>
            <p id="bpm-display">Your Heartbeat: Calculating...</p>

            <!-- Loading Spinner -->
            <div id="loading" class="loading-spinner" style="display:none;"></div>

            <div class="camera-container">
                <video id="video-stream" autoplay muted></video>
            </div>
        </div>
    </section>

    <!-- Contact Section -->
    <footer class="contact-section">
        <div class="contact-container">
            <h3>Contact Us</h3>
            <p><strong>Phone:</strong> +91 9x3x3x0x7x</p>
            <p><strong>Email:</strong> <a href="mailto:Bavith.r01@gmail.com">Bavith.r01@gmail.com</a></p>
            <p><strong>Location:</strong> Bangalore, KA</p>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='heartbeat.js') }}"></script>
</body>
</html>
